<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculadora</title>

		<style>
			* {
				box-sizing: border-box;
			}

			html,
			body {
				width: 100%;
				background: #0b0f1a;
				color: #fff;
				font-family: Arial, sans-serif;
				margin: 0;
				padding: 0;
				min-height: 100vh;
				overflow-x: hidden;
			}

			.container {
				width: 760px;
				max-width: 100%;
				margin: 0 auto;
				padding: 88px 16px 40px;
			}

			.top-nav {
				display: flex;
				justify-content: center;
				gap: 16px;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				width: 100%;
				z-index: 30;
				background: rgba(11, 15, 26, 0.96);
				padding: 16px 16px;
				margin-bottom: 0;
			}

			.top-nav a {
				color: #d0e7ff;
				text-decoration: none;
				padding: 10px 18px;
				border: 1px solid rgba(208, 231, 255, 0.65);
				border-radius: 10px;
				background: rgba(255, 255, 255, 0.04);
				box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
				transition:
					background 0.2s ease,
					transform 0.2s ease;
			}

			.top-nav a:hover {
				background: rgba(255, 255, 255, 0.12);
				transform: translateY(-1px);
			}

			header h1 {
				text-align: center;
				margin-bottom: 20px;
				font-size: 28px;
			}

			.section {
				min-height: calc(100vh - 80px);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-start;
				padding-top: 60px;
				margin-bottom: 10px;
				scroll-margin-top: 90px;
			}

			h2 {
				text-align: center;
				margin-bottom: 20px;
			}

			.card {
				width: 100%;
				max-width: 760px;
				background: #121a2a;
				padding: 20px;
				border-radius: 12px;
				margin-bottom: 30px;
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			}

			.row {
				display: flex;
				justify-content: space-between;
				margin: 10px 0;
			}

			input {
				width: 120px;
				padding: 5px;
				border-radius: 5px;
				border: none;
				text-align: right;
			}

			.result {
				font-size: 20px;
				font-weight: bold;
				text-align: right;
				margin-top: 15px;
				color: #00e5ff;
			}

			/* Responsive Design */
			@media (max-width: 768px) {
				.container {
					width: 100%;
					max-width: 100%;
					padding: 88px 12px 40px;
				}

				.top-nav {
					flex-wrap: wrap;
					gap: 8px;
					padding: 12px 0;
				}

				.top-nav a {
					padding: 8px 12px;
					font-size: 14px;
				}

				header h1 {
					font-size: 24px;
					margin-bottom: 16px;
				}

				.section {
					min-height: calc(100vh - 60px);
					padding-top: 40px;
					scroll-margin-top: 70px;
				}

				h2 {
					font-size: 20px;
					margin-bottom: 16px;
				}

				.card {
					padding: 16px;
					margin-bottom: 20px;
				}

				.row {
					flex-direction: column;
					align-items: stretch;
					gap: 8px;
				}

				.row label {
					font-weight: bold;
					margin-bottom: 4px;
				}

				input {
					width: 100%;
					padding: 8px;
					font-size: 16px; /* Prevents zoom on iOS */
				}

				.result {
					font-size: 18px;
					text-align: center;
					margin-top: 20px;
				}
			}

			@media (max-width: 480px) {
				.container {
					padding: 88px 10px 30px;
				}

				.top-nav {
					flex-direction: column;
					align-items: center;
					padding: 14px 0;
					width: 100%;
				}

				.top-nav a {
					width: 100%;
					max-width: 200px;
					text-align: center;
				}

				header h1 {
					font-size: 20px;
				}

				.section {
					min-height: calc(100vh - 50px);
					padding-top: 30px;
				}

				h2 {
					font-size: 18px;
				}

				.card {
					padding: 12px;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<nav class="top-nav">
				<a href="#dolares">$$$</a>
				<a href="#colones">₡₡₡</a>
				<a href="#envio">Envío</a>
			</nav>

			<section id="dolares" class="section">
				<h2>💰 $$$ 💰</h2>
				<div class="card">
					<div class="row">
						<label>Costo:</label>
						<input type="number" id="costo1" value="0" />
					</div>

					<div class="row">
						<label>Utilidad:</label>
						<input
							type="number"
							step="0.01"
							id="utilidad1"
							value="1.15"
						/>
					</div>

					<div class="row">
						<label>Impuesto (IV):</label>
						<input
							type="number"
							step="0.01"
							id="iv1"
							value="1.13"
						/>
					</div>

					<div class="row">
						<label>Tipo de Cambio:</label>
						<input type="number" id="tc" value="500" />
					</div>

					<div class="result" id="resultado1">₡0.00</div>
				</div>
			</section>

			<section id="colones" class="section">
				<h2>🧾 ₡₡₡ 🧾</h2>
				<div class="card">
					<div class="row">
						<label>Costo:</label>
						<input type="number" id="costo2" value="0" />
					</div>

					<div class="row">
						<label>Utilidad:</label>
						<input
							type="number"
							step="0.01"
							id="utilidad2"
							value="1.15"
						/>
					</div>

					<div class="row">
						<label>Impuesto (IV):</label>
						<input
							type="number"
							step="0.01"
							id="iv2"
							value="1.13"
						/>
					</div>

					<div class="result" id="resultado2">₡0.00</div>
				</div>
			</section>

			<section id="envio" class="section">
				<h2>🚚 Cálculo de Envío</h2>
				<div class="card">
					<div class="row">
						<label>Peso (kg):</label>
						<input type="number" step="0.01" id="peso" value="5" />
					</div>

					<div class="row">
						<label>Tarifa por kg:</label>
						<input
							type="number"
							step="0.01"
							id="tarifa"
							value="12.5"
						/>
					</div>

					<div class="row">
						<label>Recargo fijo:</label>
						<input
							type="number"
							step="0.01"
							id="recargo"
							value="10"
						/>
					</div>

					<div class="result" id="resultado3">₡0.00</div>
				</div>
			</section>
		</div>

		<script>
			function calcular() {
				// Con tipo de cambio
				let costo1 =
					parseFloat(document.getElementById("costo1").value) || 0;
				let utilidad1 =
					parseFloat(document.getElementById("utilidad1").value) || 0;
				let iv1 = parseFloat(document.getElementById("iv1").value) || 0;
				let tc = parseFloat(document.getElementById("tc").value) || 0;

				let precio1 = costo1 * utilidad1 * iv1 * tc;
				document.getElementById("resultado1").innerText =
					"₡ " +
					precio1.toLocaleString("es-CR", {
						minimumFractionDigits: 2,
					});

				// Sin tipo de cambio
				let costo2 =
					parseFloat(document.getElementById("costo2").value) || 0;
				let utilidad2 =
					parseFloat(document.getElementById("utilidad2").value) || 0;
				let iv2 = parseFloat(document.getElementById("iv2").value) || 0;

				let precio2 = costo2 * utilidad2 * iv2;
				document.getElementById("resultado2").innerText =
					"₡ " +
					precio2.toLocaleString("es-CR", {
						minimumFractionDigits: 2,
					});

				// Envío
				let peso =
					parseFloat(document.getElementById("peso").value) || 0;
				let tarifa =
					parseFloat(document.getElementById("tarifa").value) || 0;
				let recargo =
					parseFloat(document.getElementById("recargo").value) || 0;

				let envio = peso * tarifa + recargo;
				document.getElementById("resultado3").innerText =
					"₡ " +
					envio.toLocaleString("es-CR", { minimumFractionDigits: 2 });
			}

			document.querySelectorAll("input").forEach((input) => {
				input.addEventListener("input", calcular);
			});

			calcular();
		</script>
	</body>
</html>
