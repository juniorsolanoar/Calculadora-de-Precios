<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculadora</title>

		<style>
			* {
				box-sizing: border-box;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				width: 100%;
				background: #0b0f1a;
				color: #fff;
				font-family: Arial, sans-serif;
				margin: 0;
				padding: 0;
				min-height: 100vh;
				overflow-x: hidden;
			}

			.top-nav {
				display: flex;
				justify-content: center;
				gap: 16px;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				width: 100%;
				z-index: 30;
				background: rgba(11, 15, 26, 0.96);
				padding: 16px;
			}

			.top-nav a {
				color: #d0e7ff;
				text-decoration: none;
				padding: 10px 18px;
				border: 1px solid rgba(208, 231, 255, 0.65);
				border-radius: 10px;
				background: rgba(255, 255, 255, 0.04);
				box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
				transition:
					background 0.2s ease,
					transform 0.2s ease;
			}

			.top-nav a:hover {
				background: rgba(255, 255, 255, 0.12);
				transform: translateY(-1px);
			}

			.tc-bar {
				position: fixed;
				top: 75px;
				left: 0;
				right: 0;
				z-index: 29;
				background: rgba(0, 20, 40, 0.97);
				border-bottom: 1px solid rgba(0, 229, 255, 0.2);
				padding: 7px 16px;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 24px;
				font-size: 13px;
				color: #a0c4e0;
				flex-wrap: wrap;
			}

			.tc-bar .tc-badge {
				display: flex;
				align-items: center;
				gap: 6px;
			}

			.tc-bar .tc-label {
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				color: #5a7fa0;
			}

			.tc-bar .tc-value {
				font-size: 15px;
				font-weight: bold;
				color: #00e5ff;
				font-variant-numeric: tabular-nums;
				font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			}

			.tc-bar .tc-source {
				font-size: 11px;
				color: #4a7a9a;
			}

			.tc-bar .tc-sep {
				width: 1px;
				height: 16px;
				background: rgba(0, 229, 255, 0.15);
				flex-shrink: 0;
			}

			.tc-bar.loading .tc-value {
				color: #3a5a70;
				animation: blink 1.2s ease-in-out infinite;
			}

			.tc-bar.error .tc-value {
				color: #ff6b6b;
				font-size: 12px;
				font-weight: normal;
			}

			@keyframes blink {
				0%,
				100% {
					opacity: 0.35;
				}
				50% {
					opacity: 1;
				}
			}

			.container {
				width: 760px;
				max-width: 100%;
				margin: 0 auto;
				padding: 106px 16px 40px;
			}

			.section {
				min-height: calc(100vh - 58px);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-start;
				padding-top: 20px;
				margin-bottom: 10px;
				scroll-margin-top: 92px;
			}

			h2 {
				text-align: center;
				margin-bottom: 20px;
			}

			.card {
				width: 100%;
				max-width: 760px;
				background: #121a2a;
				padding: 20px;
				border-radius: 12px;
				margin-bottom: 30px;
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			}

			.row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin: 10px 0;
			}

			input[type="number"] {
				width: 140px;
				padding: 6px 8px;
				border-radius: 5px;
				border: 1px solid rgba(208, 231, 255, 0.3);
				background: #1a2540;
				color: #fff;
				text-align: right;
				font-size: 15px;
			}

			input[type="number"]:focus {
				outline: none;
				border-color: #00e5ff;
			}

			input[type="range"] {
				width: 100%;
				margin: 8px 0 4px;
				accent-color: #00e5ff;
			}

			.result {
				font-size: 22px;
				font-weight: bold;
				text-align: right;
				margin-top: 20px;
				padding: 12px;
				background: rgba(0, 229, 255, 0.08);
				border-left: 3px solid #00e5ff;
				border-radius: 6px;
				color: #00e5ff;
				transition: background 0.2s ease;
				font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
				letter-spacing: 0.02em;
			}

			.result.flash {
				background: rgba(0, 229, 255, 0.2);
			}

			.slider-labels {
				display: flex;
				justify-content: space-between;
				font-size: 11px;
				color: #5a7fa0;
				margin-bottom: 12px;
			}

			.reglas-box {
				background: rgba(255, 255, 255, 0.04);
				border-radius: 8px;
				padding: 10px 14px;
				margin-bottom: 16px;
				font-size: 13px;
				color: #a0c4e0;
			}

			.regla {
				padding: 3px 0;
				transition: color 0.2s ease;
			}

			.regla + .regla {
				margin-top: 4px;
			}

			.regla.active {
				color: #00e5ff;
				font-weight: bold;
			}

			.regla.inactive {
				color: #5a7fa0;
				font-weight: normal;
			}

			/* ── Botón sticky mapa ── */
			.btn-mapa {
				position: fixed;
				bottom: 28px;
				right: 28px;
				z-index: 40;
				width: 52px;
				height: 52px;
				border-radius: 50%;
				background: #0b1e30;
				border: 1px solid rgba(0, 229, 255, 0.45);
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition:
					background 0.2s ease,
					border-color 0.2s ease,
					transform 0.2s ease;
				box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
			}

			.btn-mapa:hover {
				background: rgba(0, 229, 255, 0.1);
				border-color: #00e5ff;
				transform: translateY(-2px);
				box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
			}

			.btn-mapa:active {
				transform: scale(0.95);
			}

			.btn-mapa svg {
				width: 26px;
				height: 26px;
			}

			/* Responsive */
			@media (max-width: 768px) {
				.container {
					width: 100%;
					padding: 100px 12px 40px;
				}

				.top-nav {
					gap: 8px;
					padding: 10px 12px;
				}

				.top-nav a {
					padding: 8px 14px;
					font-size: 14px;
				}

				.tc-bar {
					top: 52px;
					gap: 14px;
					padding: 6px 12px;
					font-size: 12px;
				}

				.tc-bar .tc-value {
					font-size: 14px;
				}

				.section {
					scroll-margin-top: 86px;
					padding-top: 5px;
				}

				h2 {
					font-size: 20px;
				}

				.card {
					padding: 16px;
				}

				.row {
					flex-direction: column;
					align-items: stretch;
					gap: 6px;
				}

				.row label {
					font-weight: bold;
				}

				input[type="number"] {
					width: 100%;
					font-size: 16px;
					padding: 10px;
				}

				.result {
					font-size: 20px;
					text-align: center;
				}

				.btn-mapa {
					bottom: 20px;
					right: 20px;
					width: 48px;
					height: 48px;
				}

				.btn-mapa svg {
					width: 22px;
					height: 22px;
				}
			}

			@media (max-width: 480px) {
				.top-nav {
					flex-wrap: wrap;
					justify-content: center;
					padding: 10px;
					gap: 8px;
				}

				.top-nav a {
					padding: 8px 16px;
					font-size: 14px;
				}

				.container {
					padding-top: 118px;
				}

				.tc-bar {
					top: 80px;
				}

				.section {
					scroll-margin-top: 110px;
					padding-top: 16px;
				}
			}
		</style>
	</head>

	<body>
		<nav class="top-nav">
			<a href="#dolares">$$$</a>
			<a href="#colones">₡₡₡</a>
			<a href="#envio">Envío</a>
		</nav>

		<div class="tc-bar loading" id="tcBar">
			<div class="tc-badge">
				<span class="tc-label">Compra</span>
				<span class="tc-value" id="tcCompra">—</span>
			</div>
			<div class="tc-sep"></div>
			<div class="tc-badge">
				<span class="tc-label">Venta</span>
				<span class="tc-value" id="tcVenta">—</span>
			</div>
			<div class="tc-sep"></div>
			<span class="tc-source" id="tcFecha">Cargando · Fuente: BCCR</span>
		</div>

		<div class="container">
			<section id="dolares" class="section">
				<h2>💰 $$$ 💰</h2>
				<div class="card">
					<div class="row">
						<label for="costo1">Costo (USD):</label>
						<input
							type="number"
							id="costo1"
							value="0"
							min="0"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="utilidad1">Utilidad (%):</label>
						<input
							type="number"
							step="0.01"
							id="utilidad1"
							value="15"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="iv1">Impuesto (IV) (%):</label>
						<input
							type="number"
							step="0.01"
							id="iv1"
							value="13"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="fro1">F. Rec. Operativo (%):</label>
						<input
							type="number"
							step="0.01"
							id="fro1"
							value="1.01"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="tc">Tipo de Cambio:</label>
						<input
							type="number"
							id="tc"
							value="500"
							inputmode="decimal"
						/>
					</div>
					<div class="result" id="resultado1">₡ 0.00</div>
				</div>
			</section>

			<section id="colones" class="section">
				<h2>🧾 ₡₡₡ 🧾</h2>
				<div class="card">
					<div class="row">
						<label for="costo2">Costo (₡):</label>
						<input
							type="number"
							id="costo2"
							value="0"
							min="0"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="utilidad2">Utilidad (%):</label>
						<input
							type="number"
							step="0.01"
							id="utilidad2"
							value="15"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="iv2">Impuesto (IV) (%):</label>
						<input
							type="number"
							step="0.01"
							id="iv2"
							value="13"
							inputmode="decimal"
						/>
					</div>
					<div class="row">
						<label for="fro2">F. Rec. Operativo (%):</label>
						<input
							type="number"
							step="0.01"
							id="fro2"
							value="1.01"
							inputmode="decimal"
						/>
					</div>
					<div class="result" id="resultado2">₡ 0.00</div>
				</div>
			</section>

			<section id="envio" class="section">
				<h2>🚚 Cálculo de Envío</h2>
				<div class="card">
					<div class="row">
						<label for="distancia">Distancia (km):</label>
						<input
							type="number"
							step="0.1"
							id="distancia"
							value="1"
							min="0"
							inputmode="decimal"
						/>
					</div>

					<input
						type="range"
						id="sliderDistancia"
						min="0"
						max="50"
						step="0.1"
						value="1"
					/>
					<div class="slider-labels">
						<span>0 km</span>
						<span>25 km</span>
						<span>50 km</span>
					</div>

					<div class="reglas-box">
						<div class="regla active" id="regla-corta">
							⬤ Menos de 2 km → tarifa fija de ₡500
						</div>
						<div class="regla inactive" id="regla-larga">
							⬤ 2 km o más → ₡250 por km
						</div>
					</div>

					<div class="result" id="resultado3">₡ 0.00</div>
				</div>
			</section>
		</div>

		<!-- Botón sticky mapa -->
		<button
			class="btn-mapa"
			id="btnMapa"
			title="Ver en mapa"
			aria-label="Ver en mapa"
		>
			<svg
				viewBox="0 0 24 24"
				fill="none"
				xmlns="http://www.w3.org/2000/svg"
			>
				<path
					d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"
					stroke="#00e5ff"
					stroke-width="1.5"
					stroke-linecap="round"
					stroke-linejoin="round"
				/>
				<line
					x1="9"
					y1="3"
					x2="9"
					y2="18"
					stroke="#00e5ff"
					stroke-width="1.5"
					stroke-linecap="round"
				/>
				<line
					x1="15"
					y1="6"
					x2="15"
					y2="21"
					stroke="#00e5ff"
					stroke-width="1.5"
					stroke-linecap="round"
				/>
			</svg>
		</button>

		<script>
			// ─── Tipo de cambio oficial BCCR ──────────────────────────────────
			async function cargarTipoDeCambio() {
				const bar = document.getElementById("tcBar");
				try {
					const hoy = new Date();
					const dd = String(hoy.getDate()).padStart(2, "0");
					const mm = String(hoy.getMonth() + 1).padStart(2, "0");
					const yyyy = hoy.getFullYear();
					const url = `https://tipodecambio.paginasweb.cr/api/${dd}/${mm}/${yyyy}`;

					const resp = await fetch(url);
					if (!resp.ok) throw new Error("HTTP " + resp.status);
					const data = await resp.json();

					const compra = parseFloat(data.compra);
					const venta = parseFloat(data.venta);

					const fmt = (n) =>
						n.toLocaleString("en-US", {
							minimumFractionDigits: 2,
							maximumFractionDigits: 2,
						});

					document.getElementById("tcCompra").textContent =
						"₡ " + fmt(compra);
					document.getElementById("tcVenta").textContent =
						"₡ " + fmt(venta);
					document.getElementById("tcFecha").textContent =
						`${data.fecha} · Fuente: BCCR`;

					const tcInput = document.getElementById("tc");
					tcInput.value = venta.toFixed(2);
					calcular();

					bar.classList.remove("loading", "error");
				} catch (err) {
					console.error("Error BCCR:", err);
					bar.classList.remove("loading");
					bar.classList.add("error");
					document.getElementById("tcCompra").textContent = "—";
					document.getElementById("tcVenta").textContent = "—";
					document.getElementById("tcFecha").textContent =
						"No disponible · BCCR";
				}
			}

			// ─── Helpers ───────────────────────────────────────────────────────
			function setResult(id, value) {
				const el = document.getElementById(id);
				el.textContent =
					"₡ " +
					value.toLocaleString("en-US", {
						minimumFractionDigits: 2,
						maximumFractionDigits: 2,
					});
				el.classList.remove("flash");
				void el.offsetWidth;
				el.classList.add("flash");
				setTimeout(() => el.classList.remove("flash"), 300);
			}

			function getVal(id) {
				return parseFloat(document.getElementById(id).value) || 0;
			}

			// ─── Calcular ──────────────────────────────────────────────────────
			function calcular() {
				// --- Sección 1: Costo en USD → precio en ₡ ---
				const costo1 = getVal("costo1");
				const utilidad1 = getVal("utilidad1");
				const iv1 = getVal("iv1");
				const fro1 = getVal("fro1");
				const tc = getVal("tc");

				const precio1 =
					costo1 *
					(1 + utilidad1 / 100) *
					(1 + iv1 / 100) *
					(1 + fro1 / 100) *
					tc;
				setResult("resultado1", precio1);

				// --- Sección 2: Costo en ₡ → precio en ₡ ---
				const costo2 = getVal("costo2");
				const utilidad2 = getVal("utilidad2");
				const iv2 = getVal("iv2");
				const fro2 = getVal("fro2");

				const precio2 =
					costo2 *
					(1 + utilidad2 / 100) *
					(1 + iv2 / 100) *
					(1 + fro2 / 100);
				setResult("resultado2", precio2);

				// --- Sección 3: Envío ---
				const distancia = getVal("distancia");
				const envio = distancia < 2 ? 500 : distancia * 250;
				setResult("resultado3", envio);

				const reglaCorta = document.getElementById("regla-corta");
				const reglaLarga = document.getElementById("regla-larga");
				if (distancia < 2) {
					reglaCorta.classList.add("active");
					reglaCorta.classList.remove("inactive");
					reglaLarga.classList.add("inactive");
					reglaLarga.classList.remove("active");
				} else {
					reglaLarga.classList.add("active");
					reglaLarga.classList.remove("inactive");
					reglaCorta.classList.add("inactive");
					reglaCorta.classList.remove("active");
				}
			}

			// ─── Listeners ─────────────────────────────────────────────────────
			document
				.querySelectorAll("input[type='number']")
				.forEach((input) => {
					input.addEventListener("input", calcular);
				});

			const sliderDistancia = document.getElementById("sliderDistancia");
			const distanciaInput = document.getElementById("distancia");

			sliderDistancia.addEventListener("input", () => {
				distanciaInput.value = parseFloat(
					sliderDistancia.value,
				).toFixed(1);
				calcular();
			});

			distanciaInput.addEventListener("input", () => {
				sliderDistancia.value = Math.min(
					parseFloat(distanciaInput.value) || 0,
					50,
				);
				calcular();
			});

			// ─── Botón mapa ────────────────────────────────────────────────────
			document.getElementById("btnMapa").addEventListener("click", () => {
				const distancia = getVal("distancia");
				const query = `radio ${distancia} km`;
				window.open(`calculo-envio.html`, "_blank");
			});

			// Calcular al cargar y pedir TC al BCCR
			calcular();
			cargarTipoDeCambio();
		</script>
	</body>
</html>
